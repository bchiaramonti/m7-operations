<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>02 — EAP (WBS) | {{project_label}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  :root {
    --verde-caqui:#424135; --lime:#eef77c; --off-white:#fffdef;
    --cinza-700:#3d3d3d; --cinza-400:#9a9a8e; --cinza-200:#d9d9c8; --cinza-100:#f0f0e4;
    --radius:10px; --line-color:#b0b0a0; --line-w:2px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter',sans-serif;background:var(--off-white);color:var(--verde-caqui);}

  .topbar{background:var(--verde-caqui);padding:16px 32px;display:flex;justify-content:space-between;align-items:center;}
  .topbar a{color:var(--cinza-200);text-decoration:none;font-size:13px;font-weight:500;}
  .topbar a:hover{color:var(--lime);}
  .topbar .title{color:var(--off-white);font-size:14px;font-weight:500;}
  .page-header{background:var(--verde-caqui);padding:24px 48px 48px;color:var(--off-white);display:flex;justify-content:space-between;align-items:flex-end;}
  .page-header .num{font-size:60px;font-weight:700;color:rgba(238,247,124,0.2);line-height:1;}
  .page-header h1{font-size:32px;font-weight:400;margin-top:-10px;}
  .page-header-left{flex:1;}
  .page-header .logo{height:56px;opacity:0.85;flex-shrink:0;}

  .container{max-width:1200px;margin:0 auto;padding:48px 32px 80px;}
  .section-title{font-size:13px;text-transform:uppercase;letter-spacing:1.5px;color:var(--cinza-400);font-weight:600;margin-bottom:20px;margin-top:48px;}

  /* WBS TREE — CSS ORG CHART */
  .wbs{overflow-x:auto;padding-bottom:24px;-webkit-overflow-scrolling:touch;}
  .wbs > ul{width:max-content;min-width:100%;padding:0 40px;}
  .wbs ul{display:flex;justify-content:center;padding:0;margin:0;list-style:none;position:relative;}
  .wbs ul ul{position:relative;margin-top:36px;}
  .wbs li{display:flex;flex-direction:column;align-items:center;position:relative;padding:40px 8px 0;}
  .wbs li::before{content:'';position:absolute;top:0;left:50%;width:var(--line-w);height:40px;background:var(--line-color);}
  .wbs li::after{content:'';position:absolute;top:0;width:100%;height:var(--line-w);background:var(--line-color);left:0;}
  .wbs li:first-child::after{left:50%;width:50%;}
  .wbs li:last-child::after{left:0;width:50%;}
  .wbs li:only-child::after{display:none;}
  .wbs > ul > li::before, .wbs > ul > li::after{display:none;}
  .wbs > ul > li{padding-top:0;}
  .wbs li > ul::before{content:'';position:absolute;top:-36px;left:50%;width:var(--line-w);height:36px;background:var(--line-color);transform:translateX(-50%);}

  .node{display:inline-block;border-radius:var(--radius);text-align:center;position:relative;z-index:1;cursor:default;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:transform 0.15s;}
  .node:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.12);}

  .node.l0{background:var(--verde-caqui);color:var(--off-white);padding:20px 32px;min-width:280px;}
  .node.l0 .code{font-size:11px;font-weight:700;color:var(--lime);letter-spacing:1px;text-transform:uppercase;}
  .node.l0 .label{font-size:17px;font-weight:500;margin-top:4px;}

  .node.l1{background:#fff;border:2px solid var(--verde-caqui);padding:16px 18px;min-width:160px;max-width:200px;}
  .node.l1 .code{font-size:10px;font-weight:700;color:var(--verde-caqui);letter-spacing:0.5px;}
  .node.l1 .label{font-size:13px;font-weight:600;margin-top:4px;line-height:1.3;color:var(--cinza-700);}
  .node.l1 .count{font-size:10px;color:var(--cinza-400);margin-top:6px;}

  .node.l2{background:#fff;border:1.5px solid var(--cinza-200);padding:10px 14px;min-width:120px;max-width:160px;}
  .node.l2 .code{font-size:9px;font-weight:700;color:#fff;background:var(--verde-caqui);padding:1px 6px;border-radius:3px;display:inline-block;}
  .node.l2.trans .code{background:rgba(66,65,53,0.7);}
  .node.l2 .label{font-size:11px;font-weight:500;margin-top:4px;line-height:1.2;color:var(--cinza-700);}
  .node.l2 .owner{font-size:9px;color:var(--cinza-400);margin-top:3px;font-style:italic;}

  .node.l3{background:var(--cinza-100);border:1px solid var(--cinza-200);padding:8px 10px;min-width:100px;max-width:140px;}
  .node.l3 .code{font-size:9px;font-weight:600;color:var(--cinza-400);}
  .node.l3 .label{font-size:10px;font-weight:500;line-height:1.25;margin-top:2px;color:var(--cinza-700);}

  .wp-table{width:100%;border-collapse:collapse;background:#fff;border-radius:var(--radius);overflow:hidden;border:1px solid var(--cinza-200);margin-top:16px;font-size:13px;}
  .wp-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--cinza-400);padding:12px 16px;border-bottom:2px solid var(--cinza-200);font-weight:600;background:#fafaf0;}
  .wp-table td{padding:10px 16px;border-bottom:1px solid var(--cinza-100);color:var(--cinza-700);vertical-align:top;}
  .wp-table tr:last-child td{border-bottom:none;}
  .wp-table .wp-code{font-weight:700;color:var(--verde-caqui);font-size:12px;white-space:nowrap;}
  .wp-table .wp-fmt{font-size:10px;font-weight:600;color:var(--cinza-400);text-transform:uppercase;letter-spacing:0.5px;background:var(--cinza-100);padding:2px 8px;border-radius:4px;display:inline-block;}

  .note-box{background:#fff;border:1px solid var(--cinza-200);border-left:4px solid var(--lime);border-radius:0 var(--radius) var(--radius) 0;padding:16px 20px;margin-top:32px;font-size:13px;color:var(--cinza-700);line-height:1.6;}
  .note-box strong{color:var(--verde-caqui);}

  .legend{display:flex;gap:20px;flex-wrap:wrap;margin-top:24px;margin-bottom:8px;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--cinza-400);}
  .legend-swatch{width:14px;height:14px;border-radius:3px;border:1px solid var(--cinza-200);}

  .footer{text-align:center;padding:24px;font-size:12px;color:var(--cinza-400);border-top:1px solid var(--cinza-200);margin-top:48px;}

  @media(max-width:900px){
    .wbs{transform:scale(0.65);transform-origin:top center;}
    .container{padding:32px 16px 60px;}
    .page-header{padding:16px 24px 32px;}
    .page-header h1{font-size:24px;}
  }
</style>
</head>
<body>

{{topbar_html}}

{{page_header_html}}

<div class="container">

  <div class="legend">
    <div class="legend-item"><div class="legend-swatch" style="background:var(--verde-caqui);"></div>Nível 0 — Projeto</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fff;border:2px solid var(--verde-caqui);"></div>Nível 1 — Fases</div>
    <div class="legend-item"><div class="legend-swatch" style="background:#fff;border:1.5px solid var(--cinza-200);"></div>Nível 2 — Subfases / Processos</div>
    <div class="legend-item"><div class="legend-swatch" style="background:var(--cinza-100);"></div>Nível 3 — Pacotes de Trabalho</div>
  </div>

  <div class="wbs">
{{wbs_tree_html}}
  </div>

{{nivel_4_section_html}}

  <div class="note-box">
{{convencao_wbs_html}}
  </div>

</div>

{{footer_html}}

</body>
</html>
