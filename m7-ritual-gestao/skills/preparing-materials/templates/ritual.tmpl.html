<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ritual de Gestao {{nivel}} {{vertical}} - {{data}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #333;
      font-family: "twkEverett", Arial, sans-serif;
    }
    .presentation {
      max-width: 100%;
      margin: 0 auto;
      padding: 20px;
    }
    .slide-wrapper {
      max-width: 960px;
      margin: 0 auto 20px auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      border-radius: 4px;
      overflow: hidden;
    }
    .slide-label {
      background: #424135;
      color: #eef77c;
      font-family: "twkEverett", Arial, sans-serif;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: bold;
    }
    .slide-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      overflow: hidden;
    }
    .slide-frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 960px;
      height: 540px;
      border: none;
      transform-origin: top left;
      transform: scale(1);
    }
    @media print {
      html, body { background: white; }
      .presentation { padding: 0; max-width: none; }
      .slide-wrapper {
        box-shadow: none;
        margin: 0;
        max-width: none;
        page-break-after: always;
        border-radius: 0;
      }
      .slide-wrapper:last-child { page-break-after: auto; }
      .slide-label { display: none; }
      .slide-container { padding-bottom: 0; height: 405pt; width: 720pt; }
      .slide-frame { position: static; width: 720pt; height: 405pt; transform: none; }
    }
  </style>
</head>

<!-- ============================================================
     INSTRUCOES PARA O MATERIAL-GENERATOR
     ============================================================

     Este template contem a estrutura fixa do ritual (capa, visao geral,
     agenda, status, plano de acao, encerramento) com placeholders {{...}}.

     O bloco de especialista NAO esta inline neste template porque e
     repetido N vezes. O material-generator deve:

     1. Gerar o HTML de cada bloco de especialista (5 slides) seguindo
        a estrutura documentada em slide-structure.md
     2. Concatenar todos os blocos no placeholder {{blocos_especialistas}}
     3. Calcular numeros de slide sequenciais
     4. Preencher todos os placeholders com dados do WBR + Card

     Placeholders globais:
     - {{vertical}}, {{nivel}}, {{data}}, {{periodo_label}}
     - {{periodo_mes_label}}
     - {{diretos_label}}: "Esp1 | Esp2 | ..."

     - {{matriz_rows}}: todas as rows da tabela de visao geral
     - {{agenda_items}}: HTML dos items de agenda
     - {{blocos_especialistas}}: HTML concatenado de todos os blocos
     - {{total_acoes}}, {{pie_chart_svg}}
     - {{acoes_por_semana}}, {{acoes_por_responsavel}}
     - {{count_nao_iniciada}}, {{count_andamento}}, {{count_atrasada}}, {{count_concluida}}
     - {{plano_de_acao_rows}}: rows da tabela de acoes
     - {{encerramento_subtitulo}}, {{encerramento_cards}}
     - {{slide_num_*}}: numeros de cada slide

     Bloco de especialista: gerar como slide-wrappers HTML seguindo
     o padrao dos slides fixos acima. Ver slide-structure.md secao
